<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stella Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="splash">
    <svg class="splash-star" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#4a8fbf" stroke-width="1.5">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    <h1 class="splash-title"><span class="sc-ste">Ste</span><span class="sc-lla">lla</span> <span class="sc-cli">Cli</span><span class="sc-ent">ent</span></h1>
    <p class="splash-sub">Minecraft Launcher</p>
    <div class="splash-loader"><span></span><span></span><span></span></div>
  </div>
  <div id="stars"></div>
  <div id="app">
    <div id="titlebar">
      <span id="drag-region" class="pywebview-drag-region"><span class="sc-ste">Ste</span><span class="sc-lla">lla</span> <span class="sc-cli">Cli</span><span class="sc-ent">ent</span></span>
      <div class="win-btns">
        <button class="win-btn" onclick="minimizeWin()">─</button>
        <button class="win-btn" onclick="maximizeWin()">□</button>
        <button class="win-btn win-close" onclick="closeWin()">✕</button>
      </div>
    </div>
    <div id="app-body">
    <aside id="sidebar">
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-page="home" title="Home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-btn" data-page="account" title="Account" id="account-nav-btn">
          <span class="nav-avatar" id="nav-avatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
        </button>
        <button class="nav-btn" data-page="mods" title="Mods">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </button>
        <button class="nav-btn" data-page="instances" title="Instances">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button class="nav-btn" data-page="versions" title="Versions">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="12" x2="12" y2="8"/><line x1="12" y1="12" x2="16" y2="12"/></svg>
        </button>
        <button class="nav-btn" data-page="servers" title="Servers">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6" y2="6"/><line x1="6" y1="18" x2="6" y2="18"/></svg>
        </button>
        <button class="nav-btn" data-page="settings" title="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-btn" onclick="pywebview.api.open_url('https://discord.gg/XXtucAt5a5')" title="Discord">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.1c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.08.22.17.33.25c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.1c.32.61.67 1.19 1.07 1.74c.02.03.06.04.09.02c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z"/></svg>
        </button>
      </div>
    </aside>

    <main id="content">
      
      <div id="page-home" class="page active">
        <div class="hero">
          <h1><span class="sc-ste">Ste</span><span class="sc-lla">lla</span> <span class="sc-cli">Cli</span><span class="sc-ent">ent</span></h1>
          <p class="hero-subtitle">Minecraft Launcher</p>
        </div>
        <div class="play-card">
          <div class="play-info">
            <span id="user-badge" class="user-badge">👤 Cargando...</span>
            <div class="version-select">
              <label>Version</label>
              <span id="version-current">1.21.11</span>
            </div>
            <span id="instance-badge" class="user-badge" style="font-size:12px;color:var(--accent)">📦 Default</span>
          </div>
          <button id="play-btn" class="btn-play">▶  PLAY</button>
        </div>
        <div class="quick-nav">
          <button class="quick-btn" onclick="navigate('mods')">📦  Mods</button>
          <button class="quick-btn" onclick="navigate('settings')">⚙  Settings</button>
        </div>
      </div>

      <div id="page-account" class="page">
        <h2>Account</h2>
        <div id="account-skin" class="account-skin"></div>
        <div id="account-content"></div>
      </div>

      <div id="page-mods" class="page">
        <h2>Mods Manager</h2>
        <div class="category-tabs">
          <button class="cat-btn active" data-cat="mod">Mods</button>
          <button class="cat-btn" data-cat="modpack">Modpacks</button>
          <button class="cat-btn" data-cat="resourcepack">Resource Packs</button>
          <button class="cat-btn" data-cat="shader">Shaders</button>
        </div>
        <div class="mods-toolbar">
          <input type="text" id="mod-search" placeholder="Search by name..." />
          <select id="mod-version"></select>
          <select id="mod-sort">
            <option value="downloads">Most Downloaded</option>
            <option value="follows">Most Followed</option>
            <option value="updated">Recently Updated</option>
            <option value="relevance">Relevance</option>
          </select>
          <select id="mod-source">
            <option value="modrinth">Modrinth</option>
            <option value="forge">Forge</option>
          </select>
          <button id="mod-search-btn" class="btn-primary">Search</button>
        </div>
        <div class="mods-tabs">
          <button class="tab-btn active" data-tab="browse">Browse</button>
          <button class="tab-btn" data-tab="installed">Installed</button>
        </div>
        <div id="mods-browse" class="tab-content active"></div>
        <div id="mods-installed" class="tab-content"></div>
      </div>

      <div id="page-instances" class="page">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
          <h2 style="margin:0">Instances</h2>
          <button class="btn-primary" onclick="showCreateInstance()">+ New Instance</button>
        </div>
        <div id="instances-list" class="instances-list"></div>
      </div>

      <div id="page-servers" class="page">
        <h2>Servers</h2>
        <div style="display:flex;gap:10px;margin-bottom:20px">
          <input type="text" id="server-ip" placeholder="mc.example.com" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit" />
          <button class="btn-primary" onclick="checkServer()">Check</button>
        </div>
        <div id="server-result"></div>
        <div class="server-tabs" style="display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)">
          <button class="tab-btn active" data-stab="recent">Recent</button>
          <button class="tab-btn" data-stab="featured">Featured</button>
        </div>
        <div id="server-recent" class="stab-content active"></div>
        <div id="server-featured" class="stab-content"></div>
      </div>

      <div id="page-versions" class="page">
        <h2>Versions</h2>
        <p style="color:var(--text2);margin-bottom:20px;font-size:13px">Select a Minecraft version to use. Click a major version to expand.</p>
        <div id="version-list-home" class="version-list"></div>
      </div>

      <div id="page-settings" class="page">
        <h2>Settings</h2>
        <div class="settings-tabs">
          <button class="tab-btn active" data-tab="appearance">Appearance</button>
          <button class="tab-btn" data-tab="runtime">Runtime</button>
          <button class="tab-btn" data-tab="privacy">Privacy</button>
        </div>
        <div id="settings-appearance" class="tab-content active">
          <div class="setting-group">
            <label>Theme</label>
            <div class="theme-selector" id="theme-selector">
              <div class="theme-option" data-theme="dark">🌙 Dark</div>
              <div class="theme-option" data-theme="light">☀️ Light</div>
              <div class="theme-option" data-theme="oled">⬛ OLED</div>
            </div>
          </div>
          <div class="setting-group">
            <label>Rounded Corners</label>
            <input type="range" id="corner-slider" min="4" max="24" value="12" />
            <span id="corner-value">12px</span>
          </div>
          <div class="setting-group">
            <label>Smooth Rendering</label>
            <label class="switch">
              <input type="checkbox" id="smooth-rendering" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div id="settings-runtime" class="tab-content">
          <div class="setting-group">
            <label>Memory (RAM)</label>
            <input type="range" id="ram-slider" min="2" max="16" value="4" />
            <span id="ram-value">4 GB</span>
          </div>
          <div class="setting-group">
            <label>Java Path</label>
            <input type="text" id="java-path" placeholder="java" />
            <div style="display:flex;gap:8px;margin-top:8px">
              <button id="detect-java-btn" class="btn-primary" style="flex-shrink:0" onclick="detectJava()">🔍 Detect Java</button>
              <select id="java-detected-list" style="flex:1;display:none" onchange="applyDetectedJava(this.value)"></select>
            </div>
          </div>
          <div class="setting-group">
            <label>Minecraft Directory</label>
            <input type="text" id="mc-dir" placeholder="~/.stellaclient" />
          </div>
          <button id="save-java-btn" class="btn-primary">Save</button>
        </div>
        <div id="settings-privacy" class="tab-content">
          <div class="setting-group">
            <label>Discord RPC</label>
            <label class="switch">
              <input type="checkbox" id="discord-rpc" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </main>
    </div>
  </div>

  <div id="create-instance-overlay" class="overlay" onclick="if(event.target===this)closeCreateInstance()">
    <div class="overlay-content" style="max-width:400px">
      <button class="overlay-close" onclick="closeCreateInstance()">✕</button>
      <h2 style="margin-bottom:20px">New Instance</h2>
      <div class="setting-group">
        <label>Name</label>
        <input type="text" id="new-instance-name" placeholder="My Instance" />
      </div>
      <div class="setting-group">
        <label>Minecraft Version</label>
        <select id="new-instance-version"></select>
      </div>
      <div class="setting-group">
        <label>Icon</label>
        <select id="new-instance-icon">
          <option value="">⭐</option>
          <option value="⚔️">⚔️</option>
          <option value="🧱">🧱</option>
          <option value="🌟">🌟</option>
          <option value="🔥">🔥</option>
          <option value="❄️">❄️</option>
          <option value="🌿">🌿</option>
        </select>
      </div>
      <button class="btn-primary" onclick="createInstance()" style="width:100%;margin-top:8px">Create</button>
    </div>
  </div>

  <div id="version-subs-overlay" class="overlay" onclick="closeVersionSubs(event)">
    <div class="overlay-content" style="max-width:320px" onclick="event.stopPropagation()">
      <button class="overlay-close" onclick="closeVersionSubs()">✕</button>
      <h2 id="version-subs-title" style="margin-bottom:16px"></h2>
      <div id="version-subs-list" style="display:flex;flex-direction:column;gap:4px;max-height:50vh;overflow-y:auto"></div>
    </div>
  </div>

  <div id="mod-detail-overlay" class="overlay" onclick="closeModDetail(event)">
    <div class="overlay-content" onclick="event.stopPropagation()">
      <button class="overlay-close" onclick="closeModDetail()">✕</button>
      <div id="mod-detail-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
